name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Optional: generate published data if it isn't committed.
      # If you keep frontend/static/data/* committed, this block is skipped.
      - name: Setup Python
        if: ${{ hashFiles('frontend/static/data/summary.json') == '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        if: ${{ hashFiles('frontend/static/data/summary.json') == '' }}
        uses: astral-sh/setup-uv@v5

      - name: Run pipeline (fetch → parse → normalize → publish)
        if: ${{ hashFiles('frontend/static/data/summary.json') == '' }}
        run: |
          make setup
          make pipeline
          python -m pipeline.validate.cross_validate

          mkdir -p frontend/static/data frontend/static/pdfs
          cp data/published/line_items.csv frontend/static/data/line_items.csv
          cp data/published/summary.json frontend/static/data/summary.json
          cp data/published/documents.json frontend/static/data/documents.json
          if [ -f data/published/cross_validation.json ]; then cp data/published/cross_validation.json frontend/static/data/cross_validation.json; fi
          cp data/raw/*.pdf frontend/static/pdfs/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
