        - label_regex: "(?i)hauptamt|personal|it|organisation|bΟΦrgerservice|gremien|rathaus"

  - id: kultur_sport
    label: Kultur & Sport
    description: >-
      KulturfΟΕrderung, Veranstaltungen, Bibliothek, Vereine, SportstΟΛtten.
    rules:
      any:
        - label_regex: "(?i)kultur|bibliothek|museum|veranstaltung|sport|verein|halle|stadion"

  - id: finanzen_schulden
    label: Finanzen & Schulden
    description: >-
      Zinsen, Kredite, Kassenkredite, RΟΦcklagenbewegungen sowie zentrale Finanzpositionen.
    rules:
