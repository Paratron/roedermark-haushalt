# categories.yaml βÄ™ Lebensnahe Kategorien fΟΦr die UI
# Jede Kategorie bildet Verwaltungs-/Produktpositionen auf verstΟΛndliche Bereiche ab.
# Regeln matchen auf node.path, node.code und label aus den extrahierten line_items.
#
# βö† Regeln mΟΦssen anhand der tatsΟΛchlichen Daten verfeinert werden!

version: 1

categories:
  - id: kinderbetreuung
    label: Kinderbetreuung
    description: >-
      Alle Aufwendungen und zugehΟΕrige ErtrΟΛge rund um KindertagesstΟΛtten,
      Tagespflege sowie ZuschΟΦsse/BeitrΟΛge in diesem Bereich.
    color_hint: null
    rules:
      any:
        - path_prefix: ["Teilhaushalt Soziales", "Kinder", "Kita"]
        - label_regex: "(?i)kita|kindertages|tagespflege|krippe|hort|u3|u6"
    exclusions:
      any:
        - label_regex: "(?i)schule"

  - id: schulen
    label: Schulen
    description: >-
      Aufwendungen und ErtrΟΛge fΟΦr SchultrΟΛgeraufgaben, Unterhaltung von SchulgebΟΛuden,
      Ausstattung und ggf. ZuschΟΦsse.
    rules:
      any:
        - label_regex: "(?i)schule|grundschule|weiterfΟΦhrend|sporthalle.*schule"

  - id: strassen_verkehr
    label: StraΟüen & Verkehr
    description: >-
      Unterhaltung/Neubau von StraΟüen, Wegen, Beleuchtung, Verkehrsanlagen und ggf. Ο•PNV-ZuschΟΦsse.
    rules:
      any:
        - label_regex: "(?i)straΟüe|wege|beleuchtung|verkehr|ΟΕpnv|bus|radweg|park"

  - id: verwaltung
    label: Verwaltung
